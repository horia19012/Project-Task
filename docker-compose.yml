services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: device-management-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD}
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/mssql-tools18/bin/sqlcmd -C -S localhost -U sa -P $$MSSQL_SA_PASSWORD -Q \"SELECT 1\" || exit 1"
        ]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s

  db-init:
    build:
      context: ./db
      dockerfile: Dockerfile
    container_name: device-management-db-init
    depends_on:
      sqlserver:
        condition: service_healthy
    environment:
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "test -f /tmp/db-init.done"
        ]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    restart: unless-stopped

  api:
    build:
      context: ./DeviceManagement
      dockerfile: Dockerfile
    container_name: device-management-api
    depends_on:
      db-init:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Server=sqlserver,1433;Database=device_management_db;User Id=sa;Password=${MSSQL_SA_PASSWORD};TrustServerCertificate=True;Encrypt=False;
      GROQ_API_KEY: ${GROQ_API_KEY}
    ports:
      - "5249:8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: device-management-frontend
    depends_on:
      - api
    ports:
      - "4200:80"

volumes:
  sqlserver-data: