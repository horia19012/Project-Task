<div class="login-register-container">
  <div class="switch-buttons">
    <button type="button" [class.active]="isLogin" (click)="toggleForm(true)">Login</button>
    <button type="button" [class.active]="!isLogin" (click)="toggleForm(false)">Register</button>
  </div>

  <div *ngIf="isLogin" class="login-container">
    <h2>Login</h2>
    <form (ngSubmit)="onSubmit()" [formGroup]="loginForm" class="login-form">
      <div class="form-group">
        <label>Email:</label>
        <input
          type="email"
          formControlName="email"
          placeholder="you@example.com"
          [class.input-invalid]="submitted && loginForm.get('email')?.invalid"
        >
        <div *ngIf="submitted && loginForm.get('email')?.errors?.['required']" class="form-error">
          Email is required.
        </div>
        <div *ngIf="submitted && loginForm.get('email')?.errors?.['email']" class="form-error">
          Please enter a valid email address.
        </div>
      </div>
      <div class="form-group">
        <label>Password:</label>
        <input
          type="password"
          formControlName="password"
          placeholder="Enter password"
          [class.input-invalid]="submitted && loginForm.get('password')?.invalid"
        >
        <div *ngIf="submitted && loginForm.get('password')?.errors?.['required']" class="form-error">
          Password is required.
        </div>
      </div>
      <button type="submit" class="primary-btn">Login</button>
    </form>
  </div>

  <div *ngIf="!isLogin" class="login-container">
  <h2>Register</h2>
  <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="login-form">
    
    <div class="form-group">
      <label>Email:</label>
      <input
        type="email"
        formControlName="email"
        placeholder="you@example.com"
        [class.input-invalid]="submitted && registerForm.get('email')?.invalid"
      >
      <div *ngIf="submitted && registerForm.get('email')?.errors?.['required']" class="form-error">
        Email is required.
      </div>
      <div *ngIf="submitted && registerForm.get('email')?.errors?.['email']" class="form-error">
        Please enter a valid email address.
      </div>
    </div>

    <div class="form-group">
      <label>Name:</label>
      <input
        type="text"
        formControlName="name"
        placeholder="Your full name"
        [class.input-invalid]="submitted && registerForm.get('name')?.invalid"
      >
      <div *ngIf="submitted && registerForm.get('name')?.errors?.['required']" class="form-error">
        Name is required.
      </div>
    </div>

    <div class="form-group">
      <label>Location:</label>
      <input
        type="text"
        formControlName="location"
        placeholder="City or office"
        [class.input-invalid]="submitted && registerForm.get('location')?.invalid"
      >
      <div *ngIf="submitted && registerForm.get('location')?.errors?.['required']" class="form-error">
        Location is required.
      </div>
    </div>

    <div class="form-group">
      <label>Password:</label>
      <input
        type="password"
        formControlName="password"
        placeholder="Create password"
        [class.input-invalid]="submitted && registerForm.get('password')?.invalid"
      >
      <div *ngIf="submitted && registerForm.get('password')?.errors?.['required']" class="form-error">
        Password is required.
      </div>
    </div>

    <div class="form-group">
      <label>Confirm Password:</label>
      <input
        type="password"
        formControlName="confirmPassword"
        placeholder="Repeat password"
        [class.input-invalid]="submitted && registerForm.get('confirmPassword')?.invalid"
      >
      <div *ngIf="submitted && registerForm.get('confirmPassword')?.errors?.['required']" class="form-error">
        Confirm password is required.
      </div>
    </div>

    <div *ngIf="submitted && registerForm.errors?.['passwordMismatch']" class="form-error">
      Passwords do not match
    </div>
    <button type="submit" class="primary-btn">Register</button>
  </form>
</div>
</div>
