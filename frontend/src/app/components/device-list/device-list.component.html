<div class="devices-container">
  <div *ngIf="devices.length === 0" class="no-devices">
    <p>No devices found</p>
  </div>

  <div
    *ngFor="let device of devices"
    [class.editing]="editingDeviceId === device.id"
    (click)="editingDeviceId == null && device.id && goToDetails(device.id)"
    style="cursor: pointer"
  >
    <!-- Display Mode -->
    <div *ngIf="editingDeviceId !== device.id" class="device-item">
      <div class="device-main">
        <div class="device-info-primary">
          <h3 class="device-name">{{ device.name }}</h3>
          <p class="device-specs">
            {{ device.manufacturer }} • {{ device.type }} • {{ device.operatingSystem }}
            {{ device.osVersion }}
          </p>
        </div>
        <div class="device-info-secondary">
          <span class="spec" *ngIf="device.description"
            ><strong>Description:</strong> {{ device.description }}</span
          >
        </div>
      </div>

      <div class="device-user">
        <div class="user-info" *ngIf="getUserForDevice(device) as user">
          <div class="user-avatar">{{ user.name.charAt(0) }}</div>
          <div class="user-details">
            <p class="user-name">{{ user.name }}</p>
          </div>
        </div>
        <div class="user-info loading" *ngIf="!getUserForDevice(device) && device.userId">
          <p>Loading user information...</p>
        </div>
        <button
          *ngIf="device.userId"
          class="btn-unassign"
          (click)="unassignDevice(device.id!); $event.stopPropagation()"
        >
          Unassign
        </button>
        <div class="user-info no-user" *ngIf="!device.userId">
          <button
            *ngIf="!device.userId"
            class="btn-assign"
            (click)="assignDevice(device.id!); $event.stopPropagation()"
          >
            Assign
          </button>
        </div>
      </div>
      <div class="device-actions">
        <button class="btn-edit" (click)="startEdit(device); $event.stopPropagation()">Edit</button>
        <button class="btn-delete" (click)="deleteDevice(device.id!); $event.stopPropagation()">
          Delete
        </button>
      </div>
    </div>

    <div *ngIf="editingDeviceId === device.id" class="device-edit-form" [formGroup]="editForm">
      <div class="edit-form-group">
        <div class="form-field">
          <label [for]="'name-' + device.id">Device Name</label>
          <input type="text" [id]="'name-' + device.id" formControlName="name" />
        </div>
        <div class="form-field">
          <label [for]="'manufacturer-' + device.id">Manufacturer</label>
          <input type="text" [id]="'manufacturer-' + device.id" formControlName="manufacturer" />
        </div>
        <div class="form-field">
          <label [for]="'type-' + device.id">Device Type</label>
          <select [id]="'type-' + device.id" formControlName="type">
            <option value="">Select type</option>
            <option value="Laptop">Laptop</option>
            <option value="Desktop">Desktop</option>
            <option value="Tablet">Tablet</option>
            <option value="Mobile">Mobile</option>
          </select>
        </div>
        <div class="form-field">
          <label [for]="'os-' + device.id">Operating System</label>
          <input type="text" [id]="'os-' + device.id" formControlName="operatingSystem" />
        </div>
        <div class="form-field">
          <label [for]="'osVersion-' + device.id">OS Version</label>
          <input type="text" [id]="'osVersion-' + device.id" formControlName="osVersion" />
        </div>
        <div class="form-field">
          <label [for]="'processor-' + device.id">Processor</label>
          <input type="text" [id]="'processor-' + device.id" formControlName="processor" />
        </div>
        <div class="form-field">
          <label [for]="'ram-' + device.id">RAM</label>
          <input type="text" [id]="'ram-' + device.id" formControlName="ram" />
        </div>

        <div class="form-field">
          <label [for]="'userId-' + device.id">User ID</label>
          <input type="number" [id]="'userId-' + device.id" formControlName="userId" />
        </div>
      </div>
      <div class="form-field">
        <label [for]="'description-' + device.id">Description</label>
        <textarea
          [id]="'description-' + device.id"
          formControlName="description"
          rows="3"
        ></textarea>
      </div>
      <div class="form-actions">
        <button
          class="btn-save"
          (click)="saveEdit(); $event.stopPropagation()"
          [disabled]="editForm.invalid"
        >
          Save Changes
        </button>
        <button class="btn-cancel" (click)="cancelEdit(); $event.stopPropagation()">Cancel</button>
      </div>
    </div>
  </div>
</div>
